<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 170px;
            padding: 15px;
            background-color: #14181c;
            color: #899aa9;
            text-align: center;
            margin: 0;
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #fff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            margin-bottom: 15px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #00e054;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        hr {
            border: 0;
            border-top: 1px solid #2c3440;
            margin: 0 0 15px 0;
        }

        #resetBtn {
            background-color: #2c3440;
            color: #899aa9;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            transition: 0.2s;
        }

        #resetBtn:hover {
            background-color: #ff4040;
            color: #fff;
            border-color: #ff4040;
        }
    </style>
</head>

<body>
    <h3 data-i18n="popupTitle">Hide Ratings</h3>

    <label class="switch" data-i18n-title="switchTooltip">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
    </label>

    <hr>

    <button id="resetBtn" data-i18n="resetBtn" data-i18n-title="resetBtnTooltip">Reset Memory</button>

    <script src="popup.js"></script>
</body>

</html>
